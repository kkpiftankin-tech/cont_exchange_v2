name: cpp-build

on:
  pull_request:
    paths:
      - "cpp/**"
      - "contracts/**"
      - "CMakeLists.txt"
      - "docker/Dockerfile.service"
      - ".github/workflows/cpp-build.yml"
  push:
    branches: [main]
    paths:
      - "cpp/**"
      - "contracts/**"
      - "CMakeLists.txt"
      - "docker/Dockerfile.service"
      - ".github/workflows/cpp-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            pkg-config \
            git \
            libgrpc++-dev \
            protobuf-compiler-grpc \
            libprotobuf-dev \
            librdkafka-dev \
            libboost-all-dev

      - name: Show toolchain versions
        run: |
          cmake --version
          g++ --version
          protoc --version
          pkg-config --modversion grpc++
          pkg-config --modversion rdkafka

      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build all targets
        run: cmake --build build -j "$(nproc)"

      - name: Verify binaries produced
        run: |
          set -e
          for svc in gateway order_flow matching risk ledger market_data venues observability; do
            test -x "build/bin/${svc}" || { echo "MISSING: build/bin/${svc}"; exit 1; }
            echo "OK build/bin/${svc}"
          done

      # Тестов в проекте пока нет (см. T-F04-170 в docs/implementation-plan/F-04-batch-clearing.tasks.md).
      # ctest на пустом наборе тестов завершается успешно; шаг оставлен заготовкой.
      # Снять continue-on-error и поднять --output-on-failure до hard-fail, когда появятся unit-тесты.
      - name: Run tests (placeholder until T-F04-170)
        run: ctest --test-dir build --output-on-failure
        continue-on-error: true
