name: docker-publish

on:
  push:
    # ci/docker-publish — временно для верификации workflow до merge.
    # Перед merge revert-коммит вернёт `branches: [main]`.
    branches: [main, ci/docker-publish]
    tags: ["v*.*.*"]
    paths:
      - "cpp/**"
      - "contracts/**"
      - "cmake/**"
      - "CMakeLists.txt"
      - "docker/Dockerfile.service"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

# Чтобы одновременные пуши в main не строили одно и то же.
# Тег v*.*.* и main могут пересекаться, поэтому отдельные группы:
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/fob

jobs:
  publish:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - order_flow
          - matching
          - risk
          - ledger
          - market_data
          - venues
          - observability

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT="${GITHUB_SHA:0:7}"
          TAGS="${IMAGE_PREFIX}-${{ matrix.service }}:latest"
          TAGS="${TAGS},${IMAGE_PREFIX}-${{ matrix.service }}:sha-${SHA_SHORT}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${IMAGE_PREFIX}-${{ matrix.service }}:${VER}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Resolved tags: ${TAGS}"

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.service
          push: true
          build-args: |
            TARGET=${{ matrix.service }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Image digest
        run: echo "Published ${{ matrix.service }} with digest in step output above"
