syntax = "proto3";

package fob.matching.v1;

import "fob/common/v1/common.proto";
import "fob/orders/v1/orders.proto";
import "fob/matching/v1/batch.proto";

// Solver gRPC contract for one batch-clearing step.
//
// Versioning policy for v1 (backward-compatible changes only):
// - Add fields only with new tag numbers.
// - Never reuse or renumber existing tags.
// - Keep package fob.matching.v1 unchanged for non-breaking updates.
// - For breaking changes create a new package version (e.g. fob.matching.v2).
message BatchRequest {
  fob.common.v1.EventMeta meta = 1;

  // Unique batch identifier generated by scheduler.
  string batch_id = 2;

  // Snapshot of active flow orders included into this solve step.
  repeated fob.orders.v1.FlowOrder flow_orders = 3;

  // Replay/audit reference prices at the decision time, usually midpoint
  // prices from historical marketdata snapshots.
  map<string, fob.common.v1.Decimal> reference_prices = 4;

  // Immutable solver config snapshot used by the replay session. Matching
  // services that support per-call overrides can apply it; older services may
  // ignore it while preserving request reproducibility in logs/traces.
  string solver_config_snapshot_json = 5;
}

service Solver {
  // Synchronous solve of one batch snapshot.
  rpc Solve(BatchRequest) returns (BatchResult);
}
