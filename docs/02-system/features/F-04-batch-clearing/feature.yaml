feature:
  id: F-04
  name: Batch Clearing Cycle
  status: in-progress-mvp
  owner: core-team

description: >
  Периодический батч-клиринг FlowOrder. ContinuousClearingSolver (Eigen3
  Sparse Cholesky) решает систему спроса/предложения D(p)=0 на каждый
  интервал batchIntervalMs из solver_config (PostgreSQL), формирует
  BatchResult с clearPrices, executedRates, residualNorm, solveTimeMs
  и набором FillEvent. FillEvent публикуются в отдельный Kafka топик
  "fills"; BatchResult — в "batch.outputs". Reference prices берутся
  у Market Data Service по gRPC. Активные FlowOrder читаются из
  PostgreSQL таблицы flow_orders (когда выставлен MATCHING_POSTGRES_DSN;
  иначе fallback в in-memory).

primaryComponents:
  - matching
  - ledger
  - risk
  - market-data
  - observability

protoContracts:
  - contracts/proto/fob/orders/v1/orders.proto
  - contracts/proto/fob/matching/v1/batch.proto
  - contracts/proto/fob/matching/v1/batch_outputs.proto
  - contracts/proto/fob/matching/v1/fill_event.proto
  - contracts/proto/fob/matching/v1/solver.proto
  - contracts/proto/fob/ledger/v1/ledger.proto
  - contracts/proto/fob/observability/v1/observability.proto

storageDependencies:
  postgresql:
    - flow_orders        # источник активных заявок, читается PostgresFlowOrderRepository
    - solver_config      # batchIntervalMs, maxIterations, epsilonLiquidity, tolerance, feeModel; читается PostgresSolverConfigRepository
  clickhouse:
    - batchresults       # schema в infra/clickhouse/init.sql; ingestion в follow-up PR (cpp/market_data clickhouse_storage)
    - fills              # schema в infra/clickhouse/init.sql; ingestion в follow-up PR

codePaths:
  - cpp/matching/src/main.cpp
  - cpp/matching/src/app/matching_loop.cpp
  - cpp/matching/src/app/matching_loop.hpp
  - cpp/matching/src/app/run_batch_uc.cpp
  - cpp/matching/src/app/run_batch_uc.hpp
  - cpp/matching/src/app/solver_metrics.cpp
  - cpp/matching/src/app/solver_metrics.hpp
  - cpp/matching/src/domain/solver.hpp
  - cpp/matching/src/domain/solver_impl.cpp
  - cpp/matching/src/domain/solver_impl.hpp
  - cpp/matching/src/domain/batch_result_to_fill_events.cpp
  - cpp/matching/src/domain/batch_result_to_fill_events.hpp
  - cpp/matching/src/infra/kafka/batch_outputs_producer.cpp
  - cpp/matching/src/infra/kafka/batch_outputs_producer.hpp
  - cpp/matching/src/infra/postgres/postgres_flow_order_repository.cpp
  - cpp/matching/src/infra/postgres/postgres_flow_order_repository.hpp
  - cpp/matching/src/infra/postgres/postgres_solver_config_repository.cpp
  - cpp/matching/src/infra/postgres/postgres_solver_config_repository.hpp
  - cpp/matching/src/infra/market_data/market_data_client.cpp
  - cpp/matching/src/infra/market_data/market_data_client.hpp
  - cpp/matching/src/transport/grpc_isolation_matching_service.cpp
  - cpp/matching/src/transport/grpc_isolation_matching_service.hpp
  - cpp/ledger/src/infra/kafka_consumers.cpp
  - cpp/ledger/src/app/ledger_uc.cpp

kafkaTopics:
  produces:
    - batch.outputs      # BatchResult wrapper
    - fills              # FillEvent stream (отдельный топик)
    - execution.intents  # hedge intents (F-12, dormant в F-04 scope)
  consumes: []           # FlowOrders читаются из PostgreSQL, не Kafka

grpcServices:
  exposes:
    - fob.matching.v1.Solver  # standalone Solver.Solve(BatchRequest) для replay/backtest
  calls:
    - fob.marketdata.v1.MarketDataService.GetReferencePrices  # gRPC к Market Data
    - fob.ledger.v1.LedgerService.ApplyBatchResult            # планируется (обрабатывается на стороне Ledger через Kafka batch.outputs consumer)
    - fob.risk.v1.RiskService.OnBatchResult                   # планируется

acceptanceCriteria:
  - "Для каждого батча формируется BatchResult с валидными clearPrices и executedRates (real Eigen Sparse Cholesky solver)."
  - "FillEvent корректно отражают исполненные объёмы и цены по всем FlowOrder, включая liquidity_source, fees, fill_id."
  - "Median solveTimeMs <= 500 ms, p95 <= 1000 ms на N=1000 активных FlowOrder."
  - "residualNorm <= tolerance из solverconfig."
  - "Детерминированность: одинаковые входы -> одинаковый BatchResult."
  - "При residualNorm > tolerance или достижении maxIterations создаётся BatchResult с флагом ошибки + alert."
  - "При solveTimeMs > SLA генерируется alert; опционально kill-switch (F-16)."

knownIssues:
  - id: order-flow-postgres-write-pending
    severity: feature-gap
    description: >
      Postgres схема для flow_orders/solver_config готова (init.sql),
      matching читает её на старте. Однако order_flow сервис ещё не
      пишет принимаемые FlowOrder в эту таблицу — записи появятся
      только когда подключится postgres-writer в order_flow (отдельная
      задача T-F04-002).
  - id: clickhouse-ingestion-pending
    severity: feature-gap
    description: >
      ClickHouse-схема batchresults и fills создана в
      infra/clickhouse/init.sql и поднимается сервисом clickhouse
      в docker-compose.dev.yml. Сам ingestion-слой (Kafka consumer,
      пишущий в эти таблицы) приходит вместе с обновлением
      cpp/market_data clickhouse_storage из origin/dev — отдельный
      follow-up PR. До этого batchresults/fills остаются пустыми,
      matching пишет только в Kafka.
  - id: buy-reserve-leak
    severity: critical
    description: При FILLED BUY не освобождается разница (price_high - midpoint) * qty в ledger
    location: cpp/order_flow/src/app/order_flow_uc.cpp#L99-L103
  - id: cancel-double-count
    severity: critical
    description: ReleaseFunds при cancel после partial fill снимает оригинальную сумму
    location: cpp/order_flow/src/app/order_flow_uc.cpp#L172-L186

